<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>학원 통합 관리 · 출결·채점·안내</title>
<style>
  :root{
    --ink:#1a1d29; --ink2:#475569; --muted:#94a3b8; --line:#e2e8f0; --line2:#f1f5f9;
    --bg:#f6f7f9; --card:#ffffff; --indigo:#4f46e5; --indigo-d:#4338ca;
    --emerald:#059669; --amber:#d97706; --rose:#e11d48;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:var(--bg); font-size:14px; -webkit-font-smoothing:antialiased; font-feature-settings:"tnum";}
  .wrap{max-width:1040px; margin:0 auto; padding:0 20px}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit; cursor:pointer; border:none; background:none; font-size:14px}
  input,select,textarea{font-family:inherit; font-size:14px; color:var(--ink); padding:8px 11px; border:1px solid var(--line); border-radius:9px; background:#fff; outline:none}
  input:focus,select:focus,textarea:focus{border-color:#a5b4fc; box-shadow:0 0 0 3px #e0e7ff}
  header{background:#fff; border-bottom:1px solid var(--line)}
  .head{display:flex; align-items:flex-end; justify-content:space-between; padding:16px 0; gap:16px}
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:.2em; color:var(--indigo); text-transform:uppercase}
  h1{font-size:20px; margin:2px 0 0; font-weight:800}
  .stats{display:flex; gap:22px; text-align:right}
  .stat b{font-size:22px; font-weight:800; display:block; line-height:1}
  .stat span{font-size:11px; color:var(--muted)}
  .classbar{background:#eef1f6; border-bottom:1px solid var(--line)}
  .classbar .wrap{display:flex; align-items:center; gap:8px; padding:10px 20px; flex-wrap:wrap}
  .chip{padding:6px 12px; border-radius:9px; font-weight:600; color:var(--ink2); border:1px solid transparent; background:transparent}
  .chip:hover{background:#ffffffb0}
  .chip.on{background:#fff; border-color:#c7d2fe; color:var(--indigo-d); box-shadow:0 1px 2px #0000000d}
  .chip .cnt{font-size:11px; color:var(--muted); margin-left:6px}
  .chip .x{margin-left:8px; color:#cbd5e1} .chip .x:hover{color:var(--rose)}
  .addcls{padding:6px 10px; border-radius:9px; color:var(--muted)} .addcls:hover{color:var(--indigo); background:#ffffffb0}
  nav{background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20}
  nav .wrap{display:flex; gap:4px; flex-wrap:wrap}
  .tab{position:relative; padding:13px 16px; font-weight:600; color:var(--ink2)} .tab:hover{color:var(--ink)}
  .tab.on{color:var(--indigo)} .tab.on::after{content:""; position:absolute; left:8px; right:8px; bottom:-1px; height:2px; background:var(--indigo); border-radius:2px}
  main{padding:24px 0 90px}
  h2{font-size:18px; margin:0 0 2px; font-weight:800}
  .sec-t{font-size:15px;font-weight:800;margin:26px 0 10px;display:flex;align-items:center;gap:8px}
  .sec-t .n{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:7px;background:var(--indigo);color:#fff;font-size:12px}
  .desc{color:var(--ink2); margin:0 0 16px; max-width:660px}
  .panel{background:#fff; border:1px solid var(--line); border-radius:13px} .pad{padding:16px}
  .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
  .btn{padding:9px 15px; border-radius:9px; background:var(--indigo); color:#fff; font-weight:600} .btn:hover{background:var(--indigo-d)}
  .btn.dark{background:#0f172a} .btn.ghost{background:transparent; color:var(--ink2)} .btn.ghost:hover{color:var(--ink)}
  .btn.line{background:#fff; border:1px solid var(--line); color:var(--ink2)} .btn.line:hover{background:#f1f5f9}
  .btn.sm{padding:5px 10px;font-size:12px}
  .link{color:var(--indigo); font-size:12px} .link:hover{text-decoration:underline}
  .del{color:var(--muted); font-size:12px} .del:hover{color:var(--rose)}
  table{width:100%; border-collapse:collapse; font-size:14px}
  th{text-align:left; color:var(--muted); font-size:12px; font-weight:600; padding:10px 12px; border-bottom:1px solid var(--line2); white-space:nowrap}
  td{padding:8px 12px; border-bottom:1px solid #f6f8fa} tr:hover td{background:#fafbfc}
  .scroll{overflow-x:auto}
  .empty{background:#fff; border:1px dashed var(--line); border-radius:13px; padding:44px; text-align:center; color:var(--muted)}
  .grid5{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px}
  .mini{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 15px}
  .mini b{font-size:20px; font-weight:800; display:block} .mini span{font-size:12px; color:var(--muted)}
  .tag{display:inline-block; padding:2px 7px; border-radius:6px; font-size:11px; border:1px solid transparent}
  .att-현장{background:#d1fae5; color:#047857; border-color:#a7f3d0}
  .att-결석{background:#ffe4e6; color:#be123c; border-color:#fecdd3}
  .att-Tx{background:#ffe4e6; color:#be123c; border-color:#fecdd3}
  .att-btn{padding:4px 11px; border-radius:6px; font-size:12px; font-weight:600; border:1px solid var(--line); background:#fff; color:#94a3b8}
  .att-btn:hover{border-color:#cbd5e1; color:#475569}
  .att-btn.att-현장{background:#16a34a; color:#fff; border-color:#16a34a}
  .att-btn.att-결석,.att-btn.att-Tx{background:#dc2626; color:#fff; border-color:#dc2626}
  .num{width:60px; padding:5px 8px; text-align:left}
  .lowrow td{background:#fffbeb !important}
  .field{display:flex; flex-direction:column; gap:4px} .field span{font-size:11px; color:var(--muted)}
  /* O/X grid */
  .oxin,.hwin{width:30px;height:26px;text-align:center;padding:0;border:1px solid var(--line);border-radius:6px;background:#fff;color:#cbd5e1;font-weight:700;font-size:13px;caret-color:transparent}
  .oxin.ok{background:#e0e7ff;border-color:#a5b4fc;color:var(--indigo-d)}
  .oxin.no{background:#ffe4e6;border-color:#fecdd3;color:#be123c}
  .hwin.d1{background:#dcfce7;border-color:#bbf7d0;color:#15803d}
  .hwin.d2{background:#fef3c7;border-color:#fde68a;color:#b45309}
  .oxin:focus,.hwin:focus{outline:none;border-color:#818cf8;box-shadow:0 0 0 3px #e0e7ff;position:relative;z-index:1}
  .maxbad{color:var(--rose)!important} .maxwarn{color:var(--rose);font-size:11px;margin-left:8px;font-weight:600}
  .qhead{font-size:11px;color:var(--muted);text-align:center;padding:4px 2px;min-width:34px}
  .qhead b{display:block;color:var(--ink2);font-size:12px}
  .pt-in{width:34px;padding:2px;text-align:center;border-radius:5px;font-size:11px}
  /* card */
  .card{background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 1px 3px #0000000a}
  .card-h{background:#0f172a; color:#fff; padding:20px 24px; display:flex; align-items:flex-end; justify-content:space-between}
  .card-h .knm{font-size:24px; font-weight:800; margin-top:4px}
  .card-h .sub{color:#cbd5e1; font-size:14px; margin-top:2px}
  .card-h .eb{font-size:11px; letter-spacing:.25em; color:#a5b4fc; text-transform:uppercase}
  .card-h .rt{color:#94a3b8; font-size:12px; text-align:right}
  .summ{display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--line2)}
  .summ>div{padding:16px; text-align:center; border-left:1px solid var(--line2)} .summ>div:first-child{border-left:none}
  .summ b{font-size:22px; font-weight:800} .summ b i{font-size:13px; font-weight:600; color:var(--muted); font-style:normal; margin-left:2px}
  .summ span{display:block; font-size:11px; color:var(--muted); margin-top:4px}
  .charts{display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:22px}
  .chart-t{font-weight:700; color:#334155; margin-bottom:8px; font-size:14px}
  .legend{display:flex; gap:14px; font-size:11px; color:var(--ink2); margin-top:6px}
  .legend i{display:inline-block; width:11px; height:3px; border-radius:2px; margin-right:4px; vertical-align:middle}
  /* msg */
  .msgbox{width:100%;min-height:96px;font-family:inherit;font-size:13px;line-height:1.5;background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:9px 11px;resize:vertical;color:var(--ink)}
  .ph{display:inline-block;background:#eef2ff;color:var(--indigo-d);border-radius:5px;padding:1px 6px;font-size:11px;margin:2px 3px 2px 0;font-family:ui-monospace,monospace}
  footer{position:fixed; bottom:0; left:0; right:0; background:#ffffffe8; backdrop-filter:blur(6px); border-top:1px solid var(--line)}
  footer .wrap{display:flex; align-items:center; justify-content:space-between; padding:10px 20px; font-size:12px; color:var(--muted)}
  .foot-btns{display:flex; gap:8px; margin-left:auto}
  @media (max-width:640px){ .grid5{grid-template-columns:repeat(2,1fr)} .charts{grid-template-columns:1fr} .stats{display:none} .summ{grid-template-columns:repeat(2,1fr)} }
  @media print{ header,nav,.classbar,footer,.noprint{display:none !important} main{padding:0} body{background:#fff} .card{border:none; box-shadow:none} }
</style>
</head>
<body>
  <header><div class="wrap head">
    <div><div class="eyebrow">학원 통합 관리</div><h1>출결 · 채점 · 안내</h1></div>
    <div class="stats" id="stats"></div>
  </div></header>
  <div class="classbar"><div class="wrap" id="classbar"></div></div>
  <nav><div class="wrap" id="nav"></div></nav>
  <main><div class="wrap" id="main"></div></main>
  <footer><div class="wrap">
    <span class="noprint" id="storeNote">이 브라우저에 저장됩니다</span>
    <span class="foot-btns">
      <button class="btn dark" id="seedBtn" style="display:none">예시 데이터 채우기</button>
      <button class="del" id="resetBtn" style="padding:7px 12px">전체 초기화</button>
      <button class="btn line" id="backupBtn" style="padding:7px 12px">백업 저장</button>
      <button class="btn line" id="restoreBtn" style="padding:7px 12px">백업 복원</button>
    </span>
  </div></footer>
  <input type="file" id="restoreFile" accept="application/json" style="display:none" />
  <input type="file" id="xlsxFile" accept=".xlsx,.xls,.csv" style="display:none" />

const OLD_TMPL_1="[{차시}차시 안내] {이름} 학생\n· 테스트: {점수}점 (반평균 {반평균}점)\n· 등수: {등수}\n· 숙제 완성도: {달성률}%\n· 다음 숙제: {숙제}\n감사합니다.";
const DEFAULT_TMPL="[{날짜} {차시}차시 안내] {이름} 학생\n· 테스트: {점수}점 (반평균 {반평균}점)\n· 등수: {등수}\n· 숙제 완성도: {달성률}%\n· 다음 숙제: {숙제}\n감사합니다.";

function emptyDB(){ return { classes:[], students:[], sessions:[], records:{}, settings:{tmpl:DEFAULT_TMPL} }; }
function migrate(d){ d.settings||=({tmpl:DEFAULT_TMPL}); d.settings.tmpl||=DEFAULT_TMPL;
  if(d.settings.tmpl===OLD_TMPL_1) d.settings.tmpl=DEFAULT_TMPL;   // 옛 기본 템플릿이면 날짜 포함본으로 갱신
  (d.students||[]).forEach(s=>{ delete s.hwType; }); return d; }
function load(){ try{ const d=JSON.parse(localStorage.getItem(LS_KEY)); if(!d) return emptyDB(); return migrate(d); }catch{ return emptyDB(); } }
function save(){ const s=JSON.stringify(db); localStorage.setItem(LS_KEY, s); refreshStats(); if(window.__cloud) window.__cloud.save(s); }
let db=load();
/* 공용(클라우드) 반영: 다른 선생님이 저장하면 실시간으로 여기 데이터가 갱신됩니다 */
let __pendingCloud=false;
const __typing=()=>{ const a=document.activeElement; return a&&(a.tagName==="INPUT"||a.tagName==="TEXTAREA"); };
window.__applyCloud=function(jsonStr){ try{ const d=migrate(JSON.parse(jsonStr)); localStorage.setItem(LS_KEY, jsonStr); db=d;
    if(__typing()){ __pendingCloud=true; } else { if(ui.classId&&!db.classes.some(c=>c.id===ui.classId)) ui.classId=db.classes[0]?.id??null; renderAll(); } }catch(e){} };

/* test scoring */
function effPoints(session){
  const t=session.test||{}; const n=num(t.qCount)||0; const total=num(session.testTotal)||100; const arr=[];
  for(let i=0;i<n;i++){ const p=t.points&&t.points[i]!=null&&t.points[i]!=="" ? num(t.points[i]) : null; arr.push(p!=null?p:(n?total/n:0)); }
  return arr;
}
const testMax=session=>Math.round(effPoints(session).reduce((a,b)=>a+b,0)*10)/10;
function scoreOf(session,r){
  const t=session.test;
  if(t&&(num(t.qCount)||0)>0&&r.q){ const pts=effPoints(session); let has=false,sum=0;
    for(let i=0;i<pts.length;i++){ const mk=r.q[i]; if(mk==="1"){sum+=pts[i];has=true;} else if(mk==="0"||mk==="2"){has=true;} }
    if(has) return Math.round(sum*10)/10; }
  return num(r.testScore);
}
function hwCount(session){ const hw=session.hw; if(!hw) return 0; const s=num(hw.start),e=num(hw.end); if(s==null||e==null||e<s) return 0; return e-s+1; }
function hwRate(session,r){ const n=hwCount(session); if(!n||!r.hq) return null; let done=0; for(let i=0;i<n;i++){ const mk=r.hq[i]; if(mk==="1"||mk==="2") done++; } return done/n*100; }
function sessionStats(session,rec,students){
  const rows=students.map(s=>{ const r=rec[s.id]||{}; const score=scoreOf(session,r); const wbRate=hwRate(session,r);
    return {id:s.id,name:s.name,att:r.attendance||"",score,wbRate}; });
  const scored=rows.filter(r=>r.score!=null); const scores=scored.map(r=>r.score).sort((a,b)=>b-a);
  const avg=mean(scores); const topN=Math.max(1,Math.ceil(scores.length*0.3)); const top30=scores.length?mean(scores.slice(0,topN)):null;
  const rankMap={}; let rank=0,prev=null,seen=0;
  [...scored].sort((a,b)=>b.score-a.score).forEach(r=>{seen++; if(r.score!==prev){rank=seen;prev=r.score;} rankMap[r.id]=rank;});
  const wbAvg=mean(rows.map(r=>r.wbRate).filter(x=>x!=null));
  return {rows,avg,top30,rankMap,wbAvg,graded:scored.length};
}

/* 엑셀(.xlsx) 업로드 지원 — SheetJS를 필요할 때만 불러옴 */
function loadXLSX(){ return new Promise((res,rej)=>{ if(window.XLSX) return res(window.XLSX);
  const sc=document.createElement("script"); sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  sc.onload=()=>window.XLSX?res(window.XLSX):rej(new Error("XLSX")); sc.onerror=()=>rej(new Error("XLSX load fail")); document.head.appendChild(sc); }); }
async function downloadTemplate(){ try{ const XLSX=await loadXLSX();
  const rows=[["이름","학교","학년","학생연락처","학부모연락처"],
              ["홍길동","대치고","고2","010-1111-2222","010-3333-4444"],
              ["","","","",""]];
  const ws=XLSX.utils.aoa_to_sheet(rows); ws["!cols"]=[{wch:12},{wch:14},{wch:8},{wch:18},{wch:18}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"명단");
  XLSX.writeFile(wb,"학생명단_양식.xlsx");
}catch(e){ console.error(e); alert("양식을 만들지 못했습니다. 인터넷 연결 확인 후 다시 시도해 주세요."); } }
function pickCols(header){ const idx={}; header.forEach((h,i)=>{ const s=String(h==null?"":h).replace(/\s/g,"");
  if(/이름|성명/.test(s)){ if(idx.name==null) idx.name=i; }
  else if(/학교/.test(s)){ if(idx.school==null) idx.school=i; }
  else if(/학년|학년도/.test(s)){ if(idx.grade==null) idx.grade=i; }
  else if(/학부모|부모|보호자/.test(s)){ if(idx.pp==null) idx.pp=i; }
  else if(/학생.*(연락처|전화|번호|폰)|^학생$/.test(s)){ if(idx.sp==null) idx.sp=i; }
  else if(/연락처|전화|번호|휴대/.test(s)){ if(idx.sp==null) idx.sp=i; else if(idx.pp==null) idx.pp=i; }
}); return idx; }
function importRows(rows){ if(!rows||!rows.length) return 0;
  const norm=v=>String(v==null?"":v).trim();
  let hi=rows.findIndex(r=>Array.isArray(r)&&r.some(c=>/이름|성명/.test(norm(c))));
  let cols, start;
  if(hi>=0){ cols=pickCols(rows[hi]); start=hi+1; if(cols.name==null) cols.name=0; }
  else { cols={name:0,school:1,grade:2,sp:3,pp:4}; start=0; }
  const add=[];
  for(let i=start;i<rows.length;i++){ const r=rows[i]; if(!Array.isArray(r)) continue;
    const name=norm(r[cols.name]); if(!name||/^이름$|^성명$/.test(name)) continue;
    add.push({id:uid(),classId:ui.classId,name,
      school:cols.school!=null?norm(r[cols.school]):"", grade:cols.grade!=null?norm(r[cols.grade]):"",
      studentPhone:cols.sp!=null?norm(r[cols.sp]):"", parentPhone:cols.pp!=null?norm(r[cols.pp]):""}); }
  if(add.length){ db.students.push(...add); save(); }
  return add.length; }

function renderGradeBody(body,session,students){
  const rec=recOf(session.id); const st=sessionStats(session,rec,students);
  const boost=st.rows.filter(r=>r.wbRate!=null&&r.wbRate<=65).length;
  const qn=num(session.test?.qCount)||0; const pts=effPoints(session);
  const hwS=num(session.hw?.start), hwE=num(session.hw?.end); const hn=hwCount(session);
  const hwLabel=i=>(hwS!=null?hwS+i:i+1);

  body.innerHTML=`
    <div class="grid5" id="g_stats">
      ${mini("반평균 점수",one(st.avg))}${mini("상위30% 평균",one(st.top30))}${mini("반평균 완성도",pct(st.wbAvg))}${mini("응시 인원",st.graded+"/"+students.length)}${mini("보충대상 (65%↓)",boost)}
    </div>

    <div class="sec-t"><span class="n">A</span>출결</div>
    <div class="panel scroll"><table id="gA" style="min-width:380px"><thead><tr><th>#</th><th>이름</th><th>출결</th></tr></thead><tbody>
      ${students.map((s,i)=>{ const r=rec[s.id]||{}; return `<tr data-sid="${s.id}">
        <td class="tnum" style="color:var(--muted)">${i+1}</td><td style="font-weight:600;white-space:nowrap">${esc(s.name)}</td>
        <td><span class="attgrp" data-sid="${s.id}">${ATT.map(a=>`<button class="att-btn ${r.attendance===a?'att-'+a:''}" data-att="${a}">${a}</button>`).join(" ")}</span></td></tr>`; }).join("")}
    </tbody></table></div>

    <div class="sec-t" style="justify-content:space-between"><span style="display:flex;align-items:center;gap:8px"><span class="n">B</span>숙제 채점</span>

        <input id="hw_s" class="tnum" style="width:52px;padding:5px 8px;margin:0 4px" value="${hwS??''}" placeholder="시작"> ~
        <input id="hw_e" class="tnum" style="width:52px;padding:5px 8px;margin:0 4px" value="${hwE??''}" placeholder="끝">
        · ${hn}문항</span></div>
    ${hn===0?`<div class="empty">위에 숙제 범위(시작~끝 번호)를 입력하면 그만큼 채점 칸이 생깁니다.</div>`:`
    <div class="panel scroll"><table id="gB" style="min-width:${260+hn*34}px"><thead>
      <tr><th>#</th><th>이름</th>${Array.from({length:hn},(_,j)=>`<th class="qhead"><b>${hwLabel(j)}</b></th>`).join("")}<th>완성도</th></tr>
    </thead><tbody>
      ${students.map((s,i)=>{ const r=rec[s.id]||{}; const hq=r.hq||{}; const row=st.rows.find(x=>x.id===s.id); const low=row.wbRate!=null&&row.wbRate<=65;
        return `<tr data-sid="${s.id}" class="${low?'lowrow':''}">
          <td class="tnum" style="color:var(--muted)">${i+1}</td><td style="font-weight:600;white-space:nowrap">${esc(s.name)}</td>
          ${Array.from({length:hn},(_,j)=>`<td style="padding:3px;text-align:center"><input class="hwin ${hq[j]==='1'?'d1':hq[j]==='2'?'d2':''}" data-r="${i}" data-c="${j}" value="${hq[j]||''}" readonly></td>`).join("")}
          <td class="tnum hwrate" style="font-weight:700">${pct(row.wbRate)}</td></tr>`; }).join("")}
    </tbody></table></div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px"><b>1</b>=맞음 · <b>2</b>=틀림 · 공란=안 함. 숫자만 입력하면 옆 칸으로 이동하고, 한 것(1·2) 비율로 완성도가 계산됩니다.</p>`}

    <div class="sec-t" style="justify-content:space-between"><span style="display:flex;align-items:center;gap:8px"><span class="n">C</span>테스트 채점</span>
      <span style="font-weight:500;font-size:13px;color:var(--ink2)">문항 수
        <input id="q_count" class="tnum" style="width:56px;padding:5px 8px;margin:0 6px" value="${qn}"> · 만점 <b id="q_max" class="tnum">${testMax(session)}</b>점<span id="q_warn" class="maxwarn"></span>
      </span></div>
    <div class="panel scroll"><table id="gC" style="min-width:${260+qn*36}px"><thead>
      <tr><th rowspan="2">#</th><th rowspan="2">이름</th>${Array.from({length:qn},(_,i)=>`<th class="qhead"><b>${i+1}</b><input class="pt-in tnum" data-pt="${i}" value="${session.test.points&&session.test.points[i]!=null&&session.test.points[i]!==""?esc(session.test.points[i]):Math.round(pts[i]*10)/10}"></th>`).join("")}<th rowspan="2">총점</th><th rowspan="2">등수</th></tr>
      <tr><th colspan="${qn}" style="text-align:center;color:#cbd5e1;font-weight:400;padding:2px">↑ 문항번호 / 배점 · 칸에 0·1·2 타이핑 (1=정답), 방향키로 이동</th></tr>
    </thead><tbody>
      ${students.map((s,i)=>{ const r=rec[s.id]||{}; const q=r.q||{};
        return `<tr data-sid="${s.id}">
          <td class="tnum" style="color:var(--muted)">${i+1}</td><td style="font-weight:600;white-space:nowrap">${esc(s.name)}</td>
          ${Array.from({length:qn},(_,j)=>`<td style="padding:3px;text-align:center"><input class="oxin ${q[j]==='1'?'ok':(q[j]==='0'||q[j]==='2')?'no':''}" data-r="${i}" data-c="${j}" value="${q[j]||''}" readonly></td>`).join("")}
          <td class="tnum totcell" style="font-weight:700">${(()=>{const v=scoreOf(session,r); return v==null?'–':v;})()}</td>
          <td class="tnum rankcell">${rankText(st.rankMap[s.id],st.graded)}</td></tr>`; }).join("")}
    </tbody></table></div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px"><b>1</b>=맞음 · <b>0·2</b>=틀림 · 공란=미응시. 1만 정답으로 배점이 합산됩니다. 숫자 입력 → 옆 칸 자동 이동 · 방향키로 이동 · Backspace로 지움.</p>`;

  const setMax=()=>{ const mx=testMax(session), target=num(session.testTotal)||100; const el=$("q_max"), w=$("q_warn");
    if(!el) return; el.textContent=mx; el.classList.toggle("maxbad", mx!==target); if(w) w.textContent = mx!==target ? `⚠ 배점 합이 ${target}점과 다릅니다` : ""; };
  setMax();

  // 출결 (이벤트 위임 — 어떤 환경에서도 클릭 동작)
  const gA=body.querySelector("#gA");
  if(gA) gA.addEventListener("click",e=>{ const btn=e.target.closest("[data-att]"); if(!btn) return;
    const grp=btn.closest(".attgrp"); const sid=grp.dataset.sid; const a=btn.dataset.att; const r=recFor(session.id,sid);
    r.attendance=r.attendance===a?"":a;
    grp.querySelectorAll("[data-att]").forEach(b=>b.className="att-btn"+(r.attendance===b.dataset.att?" att-"+b.dataset.att:"")); save(); });

  // 숙제 범위 변경 → 재구성
  const applyHwRange=()=>{ session.hw={start:$("hw_s").value.trim(),end:$("hw_e").value.trim()}; save(); renderGradeBody(body,session,students); };
  $("hw_s")&&$("hw_s").addEventListener("change",applyHwRange); $("hw_e")&&$("hw_e").addEventListener("change",applyHwRange);

  // 배점 변경 → 만점 재계산
  body.querySelectorAll("#gC .pt-in").forEach(inp=>{ inp.addEventListener("input",()=>{ const i=+inp.dataset.pt; session.test.points||=[]; session.test.points[i]=inp.value; setMax(); save(); recompute(body,session,students); }); });
  // 테스트 문항 수 변경 → 재구성
  $("q_count").addEventListener("change",()=>{ const n=Math.max(0,Math.min(100,num($("q_count").value)||0)); session.test.qCount=n; if(session.test.points) session.test.points.length=n; save(); renderGradeBody(body,session,students); });

  // 입력 그리드 공통 배선(타이핑+방향키)
  const wireGrid=(sel,field,count,accept,classFor)=>{
    const focusCell=(r,c)=>{ if(r<0||r>=students.length||c<0||c>=count) return; const el=body.querySelector(`${sel}[data-r="${r}"][data-c="${c}"]`); if(el){el.focus(); el.select&&el.select();} };
    const setV=(r,c,val)=>{ const sid=students[r].id; const rr=recFor(session.id,sid); rr[field]||={}; rr[field][c]=val;
      const el=body.querySelector(`${sel}[data-r="${r}"][data-c="${c}"]`); if(el){ el.value=val; el.className=el.classList[0]+" "+classFor(val); } save(); recompute(body,session,students); };
    body.querySelectorAll(sel).forEach(inp=>inp.addEventListener("keydown",e=>{
      const r=+inp.dataset.r,c=+inp.dataset.c,k=e.key;
      if(k==="ArrowRight"){e.preventDefault();focusCell(r,c+1);}
      else if(k==="ArrowLeft"){e.preventDefault();focusCell(r,c-1);}
      else if(k==="ArrowUp"){e.preventDefault();focusCell(r-1,c);}
      else if(k==="ArrowDown"||k==="Enter"){e.preventDefault();focusCell(r+1,c);}
      else if(k==="Backspace"){e.preventDefault();setV(r,c,"");focusCell(r,c-1);}
      else if(k==="Delete"||k===" "){e.preventDefault();setV(r,c,"");}
      else if(accept(k)!=null){e.preventDefault();setV(r,c,accept(k)); c+1<count?focusCell(r,c+1):focusCell(r+1,0);}
      else if(k!=="Tab"&&k.length===1){e.preventDefault();}
    }));
  };
  // 숙제: 1·2만
  if(hn>0) wireGrid("#gB input.hwin","hq",hn, k=>(k==="1"||k==="2")?k:null, v=>v==="1"?"d1":v==="2"?"d2":"");
  // 테스트: 0·1·2만 (1=정답)
  wireGrid("#gC input.oxin","q",qn, k=>(k==="0"||k==="1"||k==="2")?k:null, v=>v==="1"?"ok":(v==="0"||v==="2")?"no":"");
}
function recompute(body,session,students){
  const rec=recOf(session.id); const st=sessionStats(session,rec,students); const boost=st.rows.filter(r=>r.wbRate!=null&&r.wbRate<=65).length;
  $("g_stats").innerHTML=`${mini("반평균 점수",one(st.avg))}${mini("상위30% 평균",one(st.top30))}${mini("반평균 완성도",pct(st.wbAvg))}${mini("응시 인원",st.graded+"/"+students.length)}${mini("보충대상 (65%↓)",boost)}`;
  body.querySelectorAll("#gB tr[data-sid]").forEach(tr=>{ const sid=tr.dataset.sid; const row=st.rows.find(x=>x.id===sid);
    const c=tr.querySelector(".hwrate"); if(c) c.textContent=pct(row.wbRate); tr.classList.toggle("lowrow",row.wbRate!=null&&row.wbRate<=65); });
  body.querySelectorAll("#gC tr[data-sid]").forEach(tr=>{ const sid=tr.dataset.sid; const r=rec[sid]||{}; const v=scoreOf(session,r);
    tr.querySelector(".totcell").textContent=v==null?"–":v; tr.querySelector(".rankcell").textContent=rankText(st.rankMap[sid],st.graded); });
}
const mini=(l,v)=>`<div class="mini"><b class="tnum">${v}</b><span>${l}</span></div>`;

function renderCards(m){
  const students=clsStudents(), sessions=clsSessions();
  if(students.length===0){ m.innerHTML=`<div class="empty">먼저 ① 명단에서 이 반의 학생을 등록하세요.</div>`; return; }
  if(!ui.card) ui.card=students[0].id;
  const student=students.find(s=>s.id===ui.card);
  const timeline=sessions.map(s=>{ const st=sessionStats(s,recOf(s.id),students); const row=st.rows.find(r=>r.id===student.id)||{};
    return {chasi:s.chasi+"차시",date:s.date||"",att:row.att||"",score:row.score,avg:st.avg==null?null:Math.round(st.avg*10)/10,rank:st.rankMap[student.id]??null,graded:st.graded,wbRate:row.wbRate==null?null:Math.round(row.wbRate),wbAvg:st.wbAvg==null?null:Math.round(st.wbAvg)}; });

    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:18px">
      <div><h2>안내카드</h2><p class="desc">선택한 학생의 최근 10차시 데이터가 자동 정리됩니다. 그대로 학부모께 공유하세요.</p></div>
      <div class="row noprint"><select id="c_sel" style="min-width:130px">${students.map(s=>`<option value="${s.id}" ${s.id===ui.card?'selected':''}>${esc(s.name)}</option>`).join("")}</select>
        <button class="btn line" id="c_print">인쇄 / PDF</button></div>
    </div>
    <div class="card">
      <div class="card-h"><div><div class="eb">학습 안내카드</div><div class="knm">${esc(student.name)}</div>
        <div class="sub">${[esc(student.school),esc(student.grade)].filter(Boolean).join(" · ")||"정보 없음"}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          ${logoSVG()}
          <div class="rt">최근 ${recent.length}차시 기준</div></div></div>
      <div class="summ">${summ("평균 테스트 점수",one(avgScore),"점")}${summ("평균 등수",avgRank==null?"–":one(avgRank),"등")}${summ("평균 숙제 완성도",avgWb==null?"–":Math.round(avgWb),"%")}${summ("출석",attend,"/"+recent.length)}</div>
      ${recent.length===0?`<div style="padding:40px"><div class="empty">아직 채점된 차시가 없습니다. ② 출결·채점에서 입력해 주세요.</div></div>`:`
      <div class="charts">
        <div><div class="chart-t">테스트 점수 vs 반평균</div>${lineChart(recent)}<div class="legend"><span><i style="background:var(--indigo)"></i>학생</span><span><i style="background:#cbd5e1"></i>반평균</span></div></div>
        <div><div class="chart-t">숙제 달성률 vs 반평균 (%)</div>${barChart(recent)}<div class="legend"><span><i style="background:var(--indigo)"></i>학생</span><span><i style="background:var(--amber)"></i>반평균</span></div></div>
      </div>
      <div class="scroll" style="padding:0 22px 22px"><table style="min-width:520px"><thead><tr>${["차시","날짜","출결","테스트","반평균","등수","숙제달성률"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>
        ${recent.map(t=>`<tr><td style="font-weight:600;white-space:nowrap">${esc(t.chasi)}</td><td style="color:var(--ink2);white-space:nowrap">${esc(t.date)||"–"}</td>
          <td>${t.att?(()=>{const d=t.att==="Tx"?"결석":t.att; return `<span class="tag att-${d}">${d}</span>`;})():'<span style="color:#cbd5e1">–</span>'}</td>
          <td class="tnum" style="font-weight:600">${t.score??"–"}</td><td class="tnum" style="color:var(--muted)">${t.avg??"–"}</td>
          <td class="tnum">${rankText(t.rank,t.graded)}</td><td class="tnum">${t.wbRate==null?"–":t.wbRate+"%"}</td></tr>`).join("")}
      </tbody></table></div>`}
    </div>`;
  $("c_sel").onchange=e=>{ui.card=e.target.value; renderCards(m);};
  $("c_print").onclick=()=>window.print();
}
const summ=(l,v,u)=>`<div><b class="tnum">${v}<i>${u}</i></b><span>${l}</span></div>`;

function renderMsg(m){
  const students=clsStudents(), sessions=clsSessions();
  if(students.length===0){ m.innerHTML=`<div class="empty">먼저 ① 명단에서 이 반의 학생을 등록하세요.</div>`; return; }
  if(sessions.length===0){ m.innerHTML=`<h2>안내 · 숙제</h2><p class="desc">먼저 ② 출결·채점에서 차시를 만들어 주세요.</p>`; return; }
  if(!ui.msgSess){ const graded=sessions.filter(s=>db.records[s.id]&&Object.keys(db.records[s.id]).length); ui.msgSess=(graded.length?graded[graded.length-1]:sessions[sessions.length-1]).id; }
  const session=sessions.find(s=>s.id===ui.msgSess)||sessions[sessions.length-1];

  m.innerHTML=`
    <h2>안내 · 숙제</h2><p class="desc">차시별 숙제와 안내문자를 준비합니다. 학생마다 점수·등수·달성률이 자동으로 채워진 문자를 복사해 카카오톡·문자로 보내세요.</p>
    <div class="panel pad" style="margin-bottom:16px">
      <div class="row" style="margin-bottom:12px">
        <select id="ms_sel" style="min-width:190px">${sessions.map(s=>`<option value="${s.id}" ${s.id===session.id?'selected':''}>${esc(s.chasi)}차시 ${s.date?'· '+esc(s.date):''}</option>`).join("")}</select>
      </div>
      <label class="field" style="margin-bottom:12px"><span>이번 차시 공통 숙제 (모든 학생에게 {숙제}로 들어감)</span>
        <textarea id="ms_hw" class="msgbox" style="min-height:56px" placeholder="예: 워크북 #41~#80, And One 5문항">${esc(session.homework||"")}</textarea></label>
      <label class="field"><span>안내문자 템플릿</span><textarea id="ms_tmpl" class="msgbox">${esc(db.settings.tmpl)}</textarea></label>
      <div style="margin-top:8px">${["{이름}","{학교}","{차시}","{날짜}","{점수}","{반평균}","{등수}","{달성률}","{숙제}"].map(p=>`<span class="ph">${p}</span>`).join("")}

      <span style="font-size:12px;color:var(--muted)">학생 ${students.length}명 · 개별 복사도 가능합니다</span></div>
    <div id="ms_list"></div>`;

  const rebuild=()=>{
    const tmpl=$("ms_tmpl").value; const hw=$("ms_hw").value;
    $("ms_list").innerHTML=students.map(s=>{ const r=recOf(session.id)[s.id]||{}; const row=st.rows.find(x=>x.id===s.id)||{};
      const msg=fillTemplate(tmpl,{student:s,session,row,rank:st.rankMap[s.id],graded:st.graded,avg:st.avg,hw:(r.hw||hw||"")});
      return `<div class="panel pad" style="margin-bottom:10px" data-sid="${s.id}">
        <div class="row" style="justify-content:space-between;margin-bottom:8px">
          <div><b style="font-weight:700">${esc(s.name)}</b> <span style="font-size:12px;color:var(--muted)">${esc(s.parentPhone)||"연락처 없음"}</span></div>
          <button class="btn line sm" data-copy="${s.id}">복사</button></div>
        <textarea class="msgbox" data-msg="${s.id}" readonly>${esc(msg)}</textarea>
        <div class="row" style="margin-top:6px"><span style="font-size:11px;color:var(--muted)">이 학생만 다른 숙제:</span>
          <input data-hw="${s.id}" value="${esc(r.hw||"")}" placeholder="(비우면 공통 숙제 사용)" style="flex:1;min-width:160px;font-size:12px;padding:5px 9px"></div>
      </div>`; }).join("");
    // wire per-row

  $("ms_sel").onchange=e=>{ ui.msgSess=e.target.value; renderMsg(m); };

}
function fillTemplate(tmpl,{student,session,row,rank,graded,avg,hw}){
  const map={ "{이름}":student.name||"", "{학교}":student.school||"", "{차시}":session.chasi||"", "{날짜}":session.date||"",
    "{점수}":row.score==null?"미응시":row.score, "{반평균}":avg==null?"–":Math.round(avg*10)/10, "{등수}":rankText(rank,graded),
    "{달성률}":row.wbRate==null?"–":Math.round(row.wbRate), "{숙제}":hw||"–" };
  return tmpl.replace(/\{이름\}|\{학교\}|\{차시\}|\{날짜\}|\{점수\}|\{반평균\}|\{등수\}|\{달성률\}|\{숙제\}/g,k=>map[k]).replace(/\[\s+/g,"[");
}
function copyText(t){ try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t); return; } }catch{}
  const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch{} document.body.removeChild(ta); }
function flash(btn,txt){ const o=btn.textContent; btn.textContent=txt; setTimeout(()=>btn.textContent=o,1200); }

/* ---- SVG charts ---- */
function lineChart(data){ const W=440,H=200,pl=34,pr=10,pt=12,pb=26,iw=W-pl-pr,ih=H-pt-pb;
  const vals=data.flatMap(d=>[d.score,d.avg]).filter(v=>v!=null); const max=Math.max(100,...vals),min=Math.min(0,...vals);
  const x=i=>pl+(data.length<=1?iw/2:iw*i/(data.length-1)); const y=v=>pt+ih-(v-min)/(max-min||1)*ih;
  const path=(key,color,dash)=>{ let d="",st=false; data.forEach((p,i)=>{const v=p[key]; if(v==null)return; d+=(st?"L":"M")+x(i)+" "+y(v)+" "; st=true;}); return d?`<path d="${d}" fill="none" stroke="${color}" stroke-width="2.4" ${dash?'stroke-dasharray="4 3"':''} stroke-linejoin="round"/>`:""; };
  const dots=data.map((p,i)=>p.score!=null?`<circle cx="${x(i)}" cy="${y(p.score)}" r="3" fill="var(--indigo)"/>`:"").join("");
  const grid=[0,.25,.5,.75,1].map(t=>{const yy=pt+ih*t;const val=Math.round(max-(max-min)*t);return `<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="#eef1f5"/><text x="${pl-6}" y="${yy+3}" font-size="10" fill="#94a3b8" text-anchor="end">${val}</text>`;}).join("");
  const labels=data.map((d,i)=>(data.length<=8||i%2===0)?`<text x="${x(i)}" y="${H-8}" font-size="9" fill="#94a3b8" text-anchor="middle">${esc(d.chasi.replace("차시",""))}</text>`:"").join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="200">${grid}${path("avg","#cbd5e1",true)}${path("score","var(--indigo)")}${dots}${labels}</svg>`; }
function barChart(data){ const W=440,H=200,pl=30,pr=10,pt=12,pb=26,iw=W-pl-pr,ih=H-pt-pb,n=data.length,bw=iw/n*0.6;
  const x=i=>pl+iw*(i+0.5)/n; const y=v=>pt+ih-(v/100)*ih;
  const grid=[0,.25,.5,.75,1].map(t=>{const yy=pt+ih*t;return `<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="#eef1f5"/><text x="${pl-6}" y="${yy+3}" font-size="10" fill="#94a3b8" text-anchor="end">${Math.round(100-100*t)}</text>`;}).join("");
  const bars=data.map((d,i)=>d.wbRate!=null?`<rect x="${x(i)-bw/2}" y="${y(d.wbRate)}" width="${bw}" height="${pt+ih-y(d.wbRate)}" rx="2" fill="var(--indigo)"/>`:"").join("");
  let ap="",stt=false; data.forEach((d,i)=>{if(d.wbAvg==null)return; ap+=(stt?"L":"M")+x(i)+" "+y(d.wbAvg)+" "; stt=true;});
  const avgLine=ap?`<path d="${ap}" fill="none" stroke="var(--amber)" stroke-width="2.2" stroke-linejoin="round"/>`:"";
  const labels=data.map((d,i)=>(n<=8||i%2===0)?`<text x="${x(i)}" y="${H-8}" font-size="9" fill="#94a3b8" text-anchor="middle">${esc(d.chasi.replace("차시",""))}</text>`:"").join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="200">${grid}${bars}${avgLine}${labels}</svg>`; }

function makeSeed(){
  const schools=["대치고","단대부고","휘문고","숙명여고","경기고","중대부고","진선여고","세화고","경기여고","영동고"];
  const fam=["김","이","박","최","정","강","조","윤","장","임","한","오","서","신","권"];
  const giv=["서준","하은","도윤","지우","예린","민재","유진","성민","지호","수아","예은","시윤","하준","지안","서연"];
  const classes=[{id:uid(),name:"고A"},{id:uid(),name:"고B"},{id:uid(),name:"고C"}];
  const students=[]; classes.forEach((c,ci)=>{ for(let i=0;i<50;i++){ students.push({id:uid(),classId:c.id,name:fam[(i+ci)%fam.length]+giv[(i*3+ci)%giv.length],school:schools[i%schools.length],grade:"고2",studentPhone:`010-${1000+i}-${2000+ci}`,parentPhone:`010-${7000+i}-${8000+ci}`}); }});
  const gradedCount=[12,5,2]; const sessions=[]; const records={};
  classes.forEach((c,ci)=>{ for(let k=0;k<20;k++){
    const s={id:uid(),classId:c.id,chasi:String(k+1),date:`${6+Math.floor(k/4)}/${(k*3)%28+1}`,hw:{start:"1",end:"40"},testTotal:"100",test:{qCount:20,points:[]},homework:"워크북 다음 범위 + And One 5문항"};
    sessions.push(s);
    if(k<gradedCount[ci]){ const bucket={}; students.filter(st=>st.classId===c.id).forEach((st,i)=>{
      const score=Math.min(100,58+((i*7+k*4)%40)+k); const nO=Math.round(score/5); const q={}; for(let j=0;j<20;j++) q[j]=j<nO?"1":"2";
      const done=Math.min(40,22+((i+k*3)%19)); const hq={}; for(let j=0;j<done;j++) hq[j]=(j%6===0?"2":"1");
      bucket[st.id]={ attendance:(i%13===0&&k%5===0?"결석":(i%17===0?"Tx":"현장")), hq, q };
    }); records[s.id]=bucket; }
  }});
  return { classes, students, sessions, records, settings:{tmpl:DEFAULT_TMPL} };
}

/* ===== 구글 로그인 접근 제어 ===== */
let __appStarted=false;
window.__startApp=function(){ if(__appStarted) return; __appStarted=true; const ov=document.getElementById("__authOverlay"); if(ov) ov.remove(); renderAll(); };
function __authBox(){ let el=document.getElementById("__authOverlay"); if(!el){ el=document.createElement("div"); el.id="__authOverlay";
  el.style.cssText="position:fixed;inset:0;z-index:9999;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif"; document.body.appendChild(el); } return el; }
window.__authUI=function(state,info){ const el=__authBox();
  const logo=(typeof LOGO_SRC!=="undefined")?`<img src="${LOGO_SRC}" alt="이카이브" style="height:44px;margin-bottom:26px">`:`<div style="font-size:24px;font-weight:800;margin-bottom:22px">이카이브</div>`;
  const gbtn=`<button id="__loginBtn" style="background:#fff;color:#0f172a;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:10px">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M45 24c0-1.6-.1-3.1-.4-4.6H24v9h11.8c-.5 2.7-2 5-4.3 6.6v5.5h7C42.6 36.7 45 30.9 45 24z"/><path fill="#34A853" d="M24 46c5.9 0 10.8-2 14.4-5.4l-7-5.5c-2 1.3-4.5 2.1-7.4 2.1-5.7 0-10.5-3.8-12.2-9H4.5v5.7C8.1 41.1 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.8 28.2c-.4-1.3-.7-2.7-.7-4.2s.2-2.9.7-4.2v-5.7H4.5C3 17.1 2.2 20.4 2.2 24s.8 6.9 2.3 9.9l7.3-5.7z"/><path fill="#EA4335" d="M24 10.7c3.2 0 6.1 1.1 8.4 3.3l6.3-6.3C34.8 4.1 29.9 2 24 2 15.4 2 8.1 6.9 4.5 14.1l7.3 5.7c1.7-5.2 6.5-9.1 12.2-9.1z"/></svg>
      Google 계정으로 로그인</button>`;
  if(state==="loading"){ el.innerHTML=`<div style="text-align:center">${logo}<div style="color:#94a3b8;font-size:13px">로그인 확인 중…</div></div>`; }
  else if(state==="denied"){ el.innerHTML=`<div style="text-align:center;max-width:360px;padding:24px">${logo}
      <div style="font-size:17px;font-weight:700;margin-bottom:10px">접근 권한이 없습니다</div>
      <div style="color:#94a3b8;font-size:13px;line-height:1.7;margin-bottom:22px">이 구글 계정은 승인되지 않았습니다.<br><b style="color:#e2e8f0">${esc(info||"")}</b><br>관리자에게 이 계정의 승인을 요청하세요.</div>${gbtn}</div>`; }
  else { el.innerHTML=`<div style="text-align:center;padding:24px">${logo}
      <div style="font-size:18px;font-weight:800;margin-bottom:6px">학원 통합 관리</div>
      <div style="color:#94a3b8;font-size:13px;margin-bottom:24px">승인된 구글 계정으로 로그인해 주세요.</div>${gbtn}</div>`; }
  const b=document.getElementById("__loginBtn"); if(b) b.onclick=()=>{ if(window.__login){ window.__authUI("loading"); window.__login(); } else alert("로그인 기능을 불러오는 중입니다. 잠시 후 다시 시도해 주세요."); };
};

/* boot */
if(window.SHARE && window.SHARE.auth){ window.__authUI("loading");

else if(gate()){ window.__startApp(); }

<!-- Firebase 공유 + 구글 로그인 연동 -->
<script type="module">
  try{
    const cfg = window.SHARE && window.SHARE.firebase;
    if(cfg && cfg.apiKey && cfg.projectId){
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getFirestore, doc, onSnapshot, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const app = initializeApp(cfg);
      const dbf = getFirestore(app);
      const ref = doc(dbf, "academy", "data");
      let cloudStarted=false;
      function startCloud(){ if(cloudStarted) return; cloudStarted=true;
        onSnapshot(ref, snap=>{ if(snap.metadata.hasPendingWrites) return; const d=snap.data();
          if(d && d.json && window.__applyCloud) window.__applyCloud(d.json); }, err=>console.error("공유 수신 오류:", err));
        let timer=null, latest=null;
        window.__cloud = { save(jsonStr){ latest=jsonStr; clearTimeout(timer); timer=setTimeout(()=>{
          setDoc(ref, { json: latest, t: Date.now() }).catch(e=>console.error("공유 저장 오류:", e)); }, 600); } };
        window.__cloudStatus && window.__cloudStatus(true);
      }

      if(window.SHARE.auth){
        const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        const auth = getAuth(app);
        try{ await setPersistence(auth, browserLocalPersistence); }catch(e){}
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt:"select_account" });
        window.__login = ()=> signInWithPopup(auth, provider).catch(e=>{ console.error("로그인 오류:", e);
          window.__authUI && window.__authUI("login"); if(e&&e.code) alert("로그인에 실패했습니다: "+e.code); });
        window.__logout = ()=> signOut(auth);
        onAuthStateChanged(auth, user=>{
          if(!user){ window.__authUI && window.__authUI("login"); return; }
          const allow=(window.SHARE.allow||[]).map(e=>String(e).toLowerCase().trim()).filter(Boolean);
          const email=(user.email||"").toLowerCase();
          if(allow.length && allow.includes(email)){ startCloud(); window.__startApp && window.__startApp(); }
          else { window.__authUI && window.__authUI("denied", user.email||""); }
        });
      } else {
        startCloud();
      }
    } else {
      window.__cloudStatus && window.__cloudStatus(false);
      if(!(window.SHARE&&window.SHARE.auth)) window.__startApp && window.__startApp();
    }
  }catch(e){ console.error("Firebase 초기화 오류:", e); window.__cloudStatus && window.__cloudStatus(false); }
</script>
